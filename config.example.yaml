# ContribAI Configuration
# Copy this file to config.yaml and fill in your values

github:
  token: "ghp_your_github_personal_access_token"
  max_repos_per_run: 5
  max_prs_per_day: 10
  rate_limit_buffer: 100

llm:
  provider: "gemini"  # gemini | openai | anthropic | ollama
  model: "gemini-2.5-flash"
  api_key: "your_api_key_here"
  temperature: 0.3
  max_tokens: 8192
  # For ollama (local models):
  # provider: "ollama"
  # model: "codellama:13b"
  # base_url: "http://localhost:11434"

analysis:
  enabled_analyzers:
    - security
    - code_quality
    - docs
    - ui_ux
  severity_threshold: "medium"  # low | medium | high | critical
  max_file_size_kb: 500
  skip_patterns:
    - "*.min.js"
    - "*.min.css"
    - "vendor/*"
    - "node_modules/*"
    - "*.lock"

contribution:
  enabled_types:
    - security_fix
    - docs_improve
    - code_quality
    - feature_add
    - ui_ux_fix
    - performance_opt
    - refactor
  max_files_per_pr: 10
  run_tests_before_pr: true
  style:
    commit_convention: "conventional"
    pr_description_style: "detailed"

discovery:
  languages:
    - python
    - javascript
    - typescript
  stars_range: [50, 10000]
  min_last_activity_days: 30
  require_contributing_guide: false
  topics: []

storage:
  db_path: "~/.contribai/memory.db"
  cache_ttl_hours: 24

# ── Phase 4+ Configuration ──────────────────────────

pipeline:
  max_concurrent_repos: 3         # parallel repo processing
  timeout_per_repo_sec: 300

scheduler:
  enabled: false
  cron: "0 */6 * * *"             # every 6 hours
  timezone: "UTC"
  max_concurrent: 3

web:
  host: "127.0.0.1"
  port: 8787
  enabled: true
  api_keys: []                     # ["cai_xxx"] for auth, empty = no auth
  webhook_secret: ""               # GitHub webhook secret for HMAC

quota:
  github_daily_limit: 5000
  llm_daily_limit: 1000
  llm_daily_tokens: 1000000
